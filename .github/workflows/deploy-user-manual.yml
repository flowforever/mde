name: Deploy User Manual

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'user-manual/**'
      - 'tests/e2e/manualScreenshots.spec.ts'
      - 'tests/e2e/support/**'
      - '.github/workflows/deploy-user-manual.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  cancel-in-progress: true
  group: pages

jobs:
  manual-screenshots:
    name: Generate manual screenshots
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate zh-CN manual screenshots
        run: npm run docs:screenshots
        env:
          MDE_E2E_WINDOW_MODE: visible

      - name: Upload manual screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: zh-cn-manual-screenshots
          path: user-manual/public/screenshots/zh-CN/*.png

  build:
    name: Build user manual
    needs: manual-screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download generated manual screenshots
        uses: actions/download-artifact@v4
        with:
          name: zh-cn-manual-screenshots
          path: user-manual/public/screenshots/zh-CN

      - name: Build manual
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: user-manual/.vitepress/dist

  deploy:
    name: Deploy user manual
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
