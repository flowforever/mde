name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos-release:
    name: Build and publish macOS release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Prepare macOS signing and notarization credentials
        run: |
          missing=0

          require_secret() {
            if [ -z "$2" ]; then
              echo "::error::$1 is required for signed macOS release builds."
              missing=1
            fi
          }

          require_secret "CSC_LINK" "$CSC_LINK"
          require_secret "CSC_KEY_PASSWORD" "$CSC_KEY_PASSWORD"
          require_secret "APPLE_API_KEY_ID" "$APPLE_API_KEY_ID"
          require_secret "APPLE_API_ISSUER" "$APPLE_API_ISSUER"
          require_secret "APPLE_API_KEY_P8_BASE64" "$APPLE_API_KEY_P8_BASE64"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}

      - name: Create release notes
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; keeping existing release notes."
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --notes-from-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish release
        run: npm run release:github
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore release notes
        run: |
          git for-each-ref "refs/tags/$GITHUB_REF_NAME" --format='%(contents)' > /tmp/release-notes.md
          gh release edit "$GITHUB_REF_NAME" \
            --title "MDE ${GITHUB_REF_NAME#v}" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
