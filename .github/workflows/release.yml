name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos-release:
    name: Build and publish macOS release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Create release notes
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; keeping existing release notes."
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --notes-from-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish release
        run: npm run release:github
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore release notes
        run: |
          git for-each-ref "refs/tags/$GITHUB_REF_NAME" --format='%(contents)' > /tmp/release-notes.md
          gh release edit "$GITHUB_REF_NAME" \
            --title "MDE ${GITHUB_REF_NAME#v}" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
