name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos-release:
    name: Build and publish macOS release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Run end-to-end tests
        run: pnpm run test:e2e

      - name: Prepare optional macOS signing and notarization credentials
        run: |
          if [ -z "$CSC_LINK" ] ||
             [ -z "$CSC_KEY_PASSWORD" ] ||
             [ -z "$APPLE_API_KEY_ID" ] ||
             [ -z "$APPLE_API_ISSUER" ] ||
             [ -z "$APPLE_API_KEY_P8_BASE64" ]; then
            echo "Apple Developer ID signing is not configured; publishing unsigned macOS DMG and ZIP artifacts."
            echo "MDE_HAS_APPLE_SIGNING=false" >> "$GITHUB_ENV"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "MDE_HAS_APPLE_SIGNING=true" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}

      - name: Create release notes
        run: |
          notes_file=".github/release-notes/$GITHUB_REF_NAME.md"

          if [ ! -f "$notes_file" ]; then
            git for-each-ref "refs/tags/$GITHUB_REF_NAME" --format='%(contents)' > /tmp/release-notes.md
            notes_file="/tmp/release-notes.md"
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "MDE ${GITHUB_REF_NAME#v}" \
              --notes-file "$notes_file"
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "MDE ${GITHUB_REF_NAME#v}" \
              --notes-file "$notes_file"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish macOS release
        run: |
          if [ "$MDE_HAS_APPLE_SIGNING" = "true" ]; then
            export APPLE_API_ISSUER="$SECRET_APPLE_API_ISSUER"
            export APPLE_API_KEY_ID="$SECRET_APPLE_API_KEY_ID"
            export CSC_KEY_PASSWORD="$SECRET_CSC_KEY_PASSWORD"
            export CSC_LINK="$SECRET_CSC_LINK"
          fi

          pnpm run release:github:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          SECRET_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          SECRET_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          SECRET_CSC_LINK: ${{ secrets.CSC_LINK }}

      - name: Restore release notes
        run: |
          notes_file=".github/release-notes/$GITHUB_REF_NAME.md"

          if [ ! -f "$notes_file" ]; then
            git for-each-ref "refs/tags/$GITHUB_REF_NAME" --format='%(contents)' > /tmp/release-notes.md
            notes_file="/tmp/release-notes.md"
          fi

          gh release edit "$GITHUB_REF_NAME" \
            --title "MDE ${GITHUB_REF_NAME#v}" \
            --notes-file "$notes_file"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows-release:
    name: Build and publish Windows release
    runs-on: windows-latest
    needs: macos-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Windows release
        run: pnpm run release:github:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore release notes
        shell: bash
        run: |
          notes_file=".github/release-notes/$GITHUB_REF_NAME.md"

          if [ ! -f "$notes_file" ]; then
            git for-each-ref "refs/tags/$GITHUB_REF_NAME" --format='%(contents)' > /tmp/release-notes.md
            notes_file="/tmp/release-notes.md"
          fi

          gh release edit "$GITHUB_REF_NAME" \
            --title "MDE ${GITHUB_REF_NAME#v}" \
            --notes-file "$notes_file"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
