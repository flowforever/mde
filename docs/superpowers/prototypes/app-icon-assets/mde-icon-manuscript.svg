<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">MDE App Icon - Manuscript Fold</title>
  <desc id="desc">Warm paper app icon with an editor page, file explorer rail, and a Markdown-inspired M monogram.</desc>
  <defs>
